    <app-root></app-root>

    <div id="splash-screen" class="is-loaded">
      <div id="splash-screen__filmstrip">
        <img alt aria-hidden="true" src="assets/images/splash_screen.png">
        <h1>Demo - IGO2 Library</h1>
      </div>
      <svg id="splash-screen__spinner" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21a9 9 0 1 0-9-9" fill="none" stroke="#b0bec5" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <style id="splash-screen-stylesheet">
      #splash-screen {
        align-items: center;
        background-color: #f5f7f9;
        bottom: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        left: 0;
        opacity: 1;
        position: absolute;
        right: 0;
        top: 0;
        transform: translateZ(0);
        z-index: 1999;
        transition: all 300ms;
      }

      #splash-screen h1 {
        margin: 16px 0;
      }

      #splash-screen.is-destroying {
        opacity: 0;
      }

      #splash-screen__filmstrip {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 24px;
      }

      #splash-screen__filmstrip img {
        width: fit-content;
        height: 95px;
      }

      #splash-screen__spinner {
        margin-top: 0;
        opacity: 0;
      }

      #splash-screen.is-loaded #splash-screen__spinner {
        animation:
          spinner-fade 0.2s ease 0.8s,
