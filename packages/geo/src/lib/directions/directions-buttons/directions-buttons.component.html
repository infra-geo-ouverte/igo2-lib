<div *ngIf="(routesFeatureStore.count$ | async) >= 1"
  class="igo-form-button-group">
  <button
    mat-icon-button
    tooltip-position="below"
    matTooltipShowDelay="500"
    (click)="zoomRoute()"
    [matTooltip]="'igo.geo.directionsForm.zoomRoute' | translate"
    color="primary"
  >
    <mat-icon svgIcon="magnify-scan"></mat-icon>
  </button>
  <button
    mat-icon-button
    tooltip-position="below"
    matTooltipShowDelay="500"
    (click)="copyDirectionsToClipboard()"
    [matTooltip]="'igo.geo.directionsForm.copy' | translate"
    color="primary"
  >
    <mat-icon svgIcon="content-copy"></mat-icon>
  </button>
  <button
    mat-icon-button
    tooltip-position="below"
    matTooltipShowDelay="500"
    (click)="copyLinkToClipboard()"
    [matTooltip]="'igo.geo.directionsForm.link' | translate"
    color="primary"
  >
    <mat-icon svgIcon="link"></mat-icon>
  </button>

  <button
    mat-icon-button
    tooltip-position="below"
    matTooltipShowDelay="500"
    (click)="printDirections()"
    [disabled]="disabled$ | async"
    [matTooltip]="'igo.geo.directionsForm.print' | translate"
    color="primary"
  >
    <mat-icon svgIcon="printer"></mat-icon>
  </button>
</div>
