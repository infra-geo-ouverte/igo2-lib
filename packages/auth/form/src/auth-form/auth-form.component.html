<div *ngIf="visible">
  <div
    *ngIf="!auth.logged && backgroundDisable"
    class="backgroundDisable"
  ></div>

  <div *ngIf="!auth.logged && showLoginDiv" class="login center-block">
    <h1>{{ 'igo.auth.connection' | translate }}</h1>

    <ng-container *ngIf="!options.intern || options.intern.enabled !== false">
      <igo-auth-intern
        [allowAnonymous]="options.allowAnonymous"
        (login)="onLogin()"
      >
      </igo-auth-intern>

      <div *ngIf="hasExternalProvider" class="divider-container">
        <mat-divider></mat-divider>
        <span>{{ 'igo.auth.or' | translate }}</span>
        <mat-divider></mat-divider>
      </div>
    </ng-container>

    <igo-auth-google *ngIf="hasGoogle" (login)="onLogin()"></igo-auth-google>
    <igo-auth-microsoft
      *ngIf="hasMicrosoft"
      (login)="onLogin()"
    ></igo-auth-microsoft>
    <igo-auth-microsoftb2c
      *ngIf="hasMicrosoftB2c"
      (login)="onLogin()"
    ></igo-auth-microsoftb2c>
    <igo-auth-facebook
      *ngIf="hasFacebook"
      (login)="onLogin()"
    ></igo-auth-facebook>
  </div>

  <div
    *ngIf="auth.logged && showAlreadyConnectedDiv"
    class="login center-block"
  >
    <p>{{ 'igo.auth.welcome' | translate: user }}</p>
    <button mat-raised-button type="button" (click)="logout()">
      {{ 'igo.auth.signOut' | translate }}
    </button>
  </div>

  <div *ngIf="showLogoutDiv" class="login center-block">
    <p>{{ 'igo.auth.deconnection' | translate }}</p>
    <button
      *ngIf="options.homeRoute"
      mat-raised-button
      type="button"
      (click)="home()"
    >
      {{ 'igo.auth.home' | translate }}
    </button>
  </div>
</div>
