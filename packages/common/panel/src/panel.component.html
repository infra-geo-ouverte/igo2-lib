@if (withHeader()) {
  <div
    class="igo-panel-header"
    title=""
    [class.igo-cursor-pointer]="cursorPointer() === true"
  >
    <div class="panel-left">
      <ng-content select="[panelLeftButton]" />
    </div>
    <h5 class="igo-panel-title">
      {{ title() }}
      <ng-content select="[panelHeader]" />
    </h5>
    <div class="panel-right">
      <ng-content select="[panelRightButton]" />
    </div>
  </div>
}
<div class="igo-panel-content" title="">
  <ng-content />
</div>
