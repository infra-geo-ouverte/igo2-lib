<mat-form-field>
  @if (showLabel() === true) {
    <mat-label>{{ placeholder() | translate }}</mat-label>
  }
  <input
    matInput
    (blur)="delayedHide(0)"
    [type]="isPassword() ? (hide ? 'password' : 'text') : 'text'"
    [required]="isPassword() ? 'true' : required"
    [placeholder]="placeholder() | translate"
    [formControl]="formControl()"
    (change)="delayedHide()"
  />
  @if (disableSwitch() === true) {
    <mat-checkbox
      class="igo-form-disable-switch"
      (click)="onDisableSwitchClick()"
      [checked]="!disabled()"
      matPrefix
    />
  }

  @if (isPassword()) {
    <button type="button" matSuffix mat-icon-button (click)="togglePassword()">
      <mat-icon color="primary">{{
        hide ? 'visibility_off' : 'visibility'
      }}</mat-icon>
    </button>
  }

  @if (formControl().errors) {
    <mat-error>{{ getErrorMessage() | translate }}</mat-error>
  }
</mat-form-field>
