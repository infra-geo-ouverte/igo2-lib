<div>
  <igo-datepicker
    #datepicker
    [placeholder]="placeholder() | translate"
    [showLabel]="showLabel()"
    [minDate]="minDate()"
    [maxDate]="maxDate()"
    [value]="formControl().value"
    [disabled]="formControl().disabled"
    [calendarType]="calendarType()"
    [startView]="startView()"
    [startAt]="startAt()"
    [datepickerFilter]="datepickerFilter()"
    [todayButtonLabel]="todayButtonLabel()"
    [clearButtonLabel]="clearButtonLabel()"
  />

  @if (disableSwitch() === true) {
    <mat-icon
      class="igo-form-disable-switch"
      (click)="onDisableSwitchClick()"
      matPrefix
      >{{ disabled() === true ? 'check_box_outline_blank' : 'check_box' }}
    </mat-icon>
  }

  @if (formControl().errors) {
    <mat-error>{{ getErrorMessage() | translate }}</mat-error>
  }
</div>
