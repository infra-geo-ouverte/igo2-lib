<mat-form-field>
  @if (showLabel() === true) {
    <mat-label>{{ placeholder() | translate }}</mat-label>
  }
  <mat-select
    [multiple]="multiple()"
    [required]="required"
    [placeholder]="placeholder() | translate"
    [formControl]="formControl()"
  >
    @for (choice of choices(); track choice) {
      <mat-option [value]="choice.value">
        {{ choice.title }}
      </mat-option>
    }
  </mat-select>
  @if (disableSwitch() === true) {
    <mat-checkbox
      class="igo-form-disable-switch"
      (click)="onDisableSwitchClick()"
      [checked]="!disabled()"
      matPrefix
    />
  }
  @if (formControl().errors) {
    <mat-error>{{ getErrorMessage() | translate }}</mat-error>
  }
</mat-form-field>
