<app-doc-viewer title="Vector Data Styling" subtitle="Geo">
  @if (structuresLayer) {
    <igo-layer-styling
      [layer]="structuresLayer"
      [initialStyle]="initialStyle"
    ></igo-layer-styling>
  }

  <app-example-viewer codeFolder="geo/vector-data-styling">
    <igo-map-browser [map]="map" [view]="view">
      <div class="map-actions --vertical --bottom --right">
        <igo-zoom-button [map]="map" color="primary" />
      </div>
    </igo-map-browser>
  </app-example-viewer>
</app-doc-viewer>
