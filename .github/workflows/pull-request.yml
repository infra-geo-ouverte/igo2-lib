# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions
#

name: Pull Request

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]

jobs:
  analyze:
    name: Analyze Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: The branch or tag ref that triggered the workflow run.
        run: echo ${GITHUB_REF#refs/*/}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Security
        run: npm audit --package-lock-only --omit=dev && npm audit signatures

      - name: Quality
        run: npm run circular-deps & npm run lint & npm run format.check

      - name: Install Playwright dependencies
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm run e2e & npm run test.ci

      - name: Coverage Report
        if: always()
        run: node scripts/src/coverage-summary.mjs

      - name: Build
        run: npm run build.libs

      - name: Build demo
        run: npm run build.demo
